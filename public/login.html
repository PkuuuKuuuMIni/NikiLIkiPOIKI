<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - icemc.lol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #9D4EDD;
            --primary-dark: #6C3299;
            --secondary-color: #240046;
            --background-color: #10002B;
            --surface-color: #1A0040;
            --text-color: #E0AAFF;
            --text-muted: #C77DFF;
            --border-radius: 12px;
            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(157, 78, 221, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(157, 78, 221, 0.1) 0%, transparent 50%);
        }

        .header {
            background: rgba(26, 0, 64, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem;
            text-align: center;
            position: relative;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E0AAFF 0%, #9D4EDD 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            transition: color var(--transition-speed);
        }

        .back-btn:hover {
            color: var(--primary-color);
        }

        .container {
            max-width: 400px;
            margin: 2rem auto;
            padding: 0 1rem;
            flex: 1;
        }

        .card {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(157, 78, 221, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(16, 0, 43, 0.6);
            border: 2px solid var(--primary-dark);
            border-radius: var(--border-radius);
            font-size: 1rem;
            color: var(--text-color);
            transition: all var(--transition-speed);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(157, 78, 221, 0.2);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: var(--border-radius);
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-speed);
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(157, 78, 221, 0.4);
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
        }

        .register-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .forgot-password {
            text-align: right;
            margin-top: 0.5rem;
        }

        .forgot-password a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .forgot-password a:hover {
            color: var(--primary-color);
        }

        .alert {
            padding: 1rem;
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease-out;
        }

        .alert-error {
            background-color: rgba(255, 47, 47, 0.1);
            color: #ff2f2f;
            border: 1px solid rgba(255, 47, 47, 0.2);
        }

        .alert-success {
            background-color: rgba(47, 255, 158, 0.1);
            color: #2fff9e;
            border: 1px solid rgba(47, 255, 158, 0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="back-btn">
            ← Back
        </a>
        <div class="logo">icemc.lol</div>
    </header>

    <div class="container">
        <div class="card">
            <h1>Welcome Back</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control" required 
                           placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" required 
                           placeholder="Enter your password">
                    <div class="forgot-password">
                        <a href="#" id="forgotPassword">Forgot password?</a>
                    </div>
                </div>

                <button type="submit" class="btn">Login</button>
            </form>

            <div class="register-link">
                Don't have an account? <a href="/register">Sign up</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { signInWithEmailAndPassword, sendPasswordResetEmail } from 'firebase/auth';

        const form = document.getElementById('loginForm');
        const forgotPasswordLink = document.getElementById('forgotPassword');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showMessage('success', 'Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = '/edit-profile';
                }, 1500);
            } catch (error) {
                showMessage('error', getErrorMessage(error));
            }
        });

        forgotPasswordLink.addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            if (!email) {
                showMessage('error', 'Please enter your email address first');
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                showMessage('success', 'Password reset email sent! Check your inbox.');
            } catch (error) {
                showMessage('error', getErrorMessage(error));
            }
        });

        function showMessage(type, message) {
            const existingAlert = document.querySelector('.alert');
            if (existingAlert) {
                existingAlert.remove();
            }

            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            
            const card = document.querySelector('.card');
            card.insertBefore(alert, card.firstChild);
            
            if (type !== 'success') {
                setTimeout(() => alert.remove(), 5000);
            }
        }

        function getErrorMessage(error) {
            switch (error.code) {
                case 'auth/invalid-email':
                    return 'Invalid email address';
                case 'auth/user-disabled':
                    return 'This account has been disabled';
                case 'auth/user-not-found':
                    return 'No account found with this email';
                case 'auth/wrong-password':
                    return 'Invalid password';
                default:
                    return error.message || 'An error occurred';
            }
        }
    </script>
</body>
</html>
